name: Trigger update sync

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and trigger CronJob
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes "$VPS_USER@$VPS_HOST" \
            "sudo kubectl create job --from=cronjob/roll-updater-sync roll-updater-sync-ci-${{ github.sha }} -n roll-updater"
